<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CingMotor</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<section id="contact-us" class="contact-section">
    <h2 class="section-title">Hubungi Kami</h2>
    <p>Silakan isi formulir di bawah ini, tim kami akan segera menghubungi Anda.</p>
    
    <div class="contact-container">
        <form class="contact-form">
            <div class="form-group">
                <label for="name">Nama Lengkap</label>
                <input type="text" id="name" name="name" placeholder="Masukkan nama Anda" required>
            </div>
            
            <div class="form-group">
                <label for="email">Alamat Email</label>
                <input type="email" id="email" name="email" placeholder="contoh@email.com" required>
            </div>

            <div class="form-group">
                <label for="phone">Nomor Telepon</label>
                <input type="tel" id="phone" name="phone" placeholder="Contoh: 08123456789" required>
            </div>

            <div class="form-group">
                <label for="message">Pesan</label>
                <textarea id="message" name="message" rows="3" placeholder="Masukkan pesan"></textarea>
            </div>

            <button type="submit" class="btn-submit" formaction="thankyou.html">Kirim Pesan</button>
        </form>
    </div>
</section>


    <footer>
        <div class="footer-content">
            <p>&copy; 2025 CingMotor. Semua Hak Dilindungi.</p>
            <div class="socials">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
    </footer>

</body>
</html>
